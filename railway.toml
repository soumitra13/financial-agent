# railway.toml — Railway deployment configuration
#
# Two services share the same Docker image but use different start commands.
# Create two services in the Railway dashboard pointing to this repo:
#
#   Service 1 (API)    — uses the startCommand below
#   Service 2 (Worker) — override startCommand in Railway UI to:
#                        python3 -m src.events.worker

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python3 -m src.api.main"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
