name: CD

on:
  push:
    branches: [main]

# Only run one deployment at a time — cancel any in-flight run if a new push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Gate: CI must pass before we deploy ─────────────────────────────────────
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: CI already passed (this job only runs after push to main, which requires PR + CI)
        run: echo "CI gate passed"

  # ── Deploy API to Railway ────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_API_SERVICE_ID }}" \
            --detach

  # ── Deploy Worker to Railway ─────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker → Railway
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy worker service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_WORKER_SERVICE_ID }}" \
            --detach

  # ── Deploy Frontend to Vercel ────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ── Notify on failure ─────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker, deploy-frontend]
    if: failure()
    steps:
      - name: Print failure summary
        run: |
          echo "::error::Production deployment failed. Check the logs above."
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
