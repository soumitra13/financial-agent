name: CD

# Trigger: runs only when the CI workflow completes on main.
# If CI failed or was cancelled, all jobs below are skipped automatically.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Only one deployment at a time — cancel any in-flight run if a new push arrives.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Gate: skip everything if CI did not succeed ──────────────────────────────
  ci-gate:
    name: CI passed?
    runs-on: ubuntu-latest
    # Skip this job (and everything that needs it) if CI didn't succeed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI succeeded — proceeding with deployment
        run: |
          echo "CI workflow '${{ github.event.workflow_run.name }}' passed."
          echo "Commit : ${{ github.event.workflow_run.head_sha }}"
          echo "Author : ${{ github.event.workflow_run.head_commit.author.name }}"

  # ── Deploy API to Railway ────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_API_SERVICE }}" \
            --environment production \
            --detach

  # ── Deploy Worker to Railway ─────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker → Railway
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy worker service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_WORKER_SERVICE }}" \
            --environment production \
            --detach

  # ── Deploy Frontend to Vercel ────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ── Notify on failure ─────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker, deploy-frontend]
    if: failure()
    steps:
      - name: Print failure summary
        run: |
          echo "::error::Production deployment failed. Check the logs above."
          echo "Commit : ${{ github.event.workflow_run.head_sha }}"
          echo "Author : ${{ github.event.workflow_run.head_commit.author.name }}"
