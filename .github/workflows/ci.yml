name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      # Unit tests use the mock LLM — no real DB or Redis needed
      LLM_PROVIDER: mock
      DATABASE_URL: postgresql://agent:agent@localhost:5432/financial_agent
      REDIS_URL: redis://localhost:6379
      API_KEY: test-key

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
          POSTGRES_DB: financial_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent -d financial_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Apply schema
        run: |
          PGPASSWORD=agent psql -h localhost -U agent -d financial_agent -f infrastructure/init.sql

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      LLM_PROVIDER: mock
      DATABASE_URL: postgresql://agent:agent@localhost:5432/financial_agent
      REDIS_URL: redis://localhost:6379
      API_KEY: test-key

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
          POSTGRES_DB: financial_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent -d financial_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply schema
        run: |
          PGPASSWORD=agent psql -h localhost -U agent -d financial_agent -f infrastructure/init.sql

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
